name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    strategy:
      matrix:
        node: [22, 24]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run check:codex-assets
      - run: npm run check:protocol-generated
      - run: npx vitest run
      - run: npm run test:contracts
      - run: node release/verify-packages.mjs
      - run: npm pack --dry-run
