name: Release npm packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish after building and verifying all packages
        required: true
        default: false
        type: boolean
      tag:
        description: npm dist-tag
        required: true
        default: next
        type: choice
        options: [next, latest]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate tag and package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"

  relay:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, target: aarch64-apple-darwin, package: relay-darwin-arm64 }
          - { runner: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, package: relay-linux-arm64-gnu }
          - { runner: ubuntu-22.04, target: x86_64-unknown-linux-gnu, package: relay-linux-x64-gnu }
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: docker/setup-buildx-action@v3
        if: runner.os == 'Linux'
      - uses: actions/cache@v4
        if: runner.os == 'macOS'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relay/target/release
            relay/target/${{ matrix.target }}/release
          key: relay-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('relay/Cargo.lock') }}
      - if: runner.os == 'macOS'
        run: rustup target add "${{ matrix.target }}"
      - if: runner.os == 'macOS'
        env:
          CCODEX_RELAY_TARGET: ${{ matrix.target }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: ./scripts/build-relay.sh
      - if: runner.os == 'Linux'
        run: ./scripts/build-linux-relay.sh "${{ matrix.target }}" "${{ matrix.package }}"
      - run: node release/verify-packages.mjs --target "${{ matrix.package }}"
      - run: packages/${{ matrix.package }}/bin/ccodex-relay --help
      - run: mkdir -p artifacts && npm pack ./packages/${{ matrix.package }} --pack-destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: artifacts/*.tgz
          if-no-files-found: error

  main:
    needs: validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run check:codex-assets
      - run: npm run check:protocol-generated
      - run: npx vitest run --config config/vitest.config.ts
      - run: npm run test:contracts
      - run: node release/verify-packages.mjs
      - run: mkdir -p artifacts && npm pack --pack-destination artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: ccodex-main
          path: artifacts/*.tgz
          if-no-files-found: error

  metadata:
    needs: [relay, main]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - run: node release/generate-manifest.mjs release-artifacts
      - run: npm sbom --omit=dev --sbom-format cyclonedx > release-artifacts/npm-sbom.cdx.json
      - run: node release/generate-cargo-sbom.mjs release-artifacts/cargo-sbom.cdx.json
      - run: node release/generate-notices.mjs && cp legal/THIRD_PARTY_NOTICES.md release-artifacts/
      - run: cp scripts/install.sh scripts/uninstall.sh release-artifacts/
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-artifacts/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            release-artifacts/release-manifest.json
            release-artifacts/SHA256SUMS
            release-artifacts/npm-sbom.cdx.json
            release-artifacts/cargo-sbom.cdx.json
            release-artifacts/THIRD_PARTY_NOTICES.md
            release-artifacts/install.sh
            release-artifacts/uninstall.sh
          if-no-files-found: error

  publish:
    needs: [relay, main, metadata]
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish
    runs-on: ubuntu-22.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@11.16.0
      - run: node release/legal-gate.mjs
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Publish platform packages first
        env:
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        run: node release/publish-tarballs.mjs "$DIST_TAG" release-artifacts/gkorepanov-ccodex-relay-*.tgz
      - name: Publish main package
        env:
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        run: node release/publish-tarballs.mjs "$DIST_TAG" "release-artifacts/gkorepanov-ccodex-$(node -p 'require("./package.json").version').tgz"

  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: release-metadata
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-metadata/* --verify-tag --generate-notes
